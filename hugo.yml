baseURL: "https://blog.baoyuchen.top/" # 【必填】部署后改为你的真实域名
title: "静水流深"
pagination:
  pagerSize: 10
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
hasCJKLanguage: true
 

# 优化设置：生成纯净的 HTML
minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # 生产环境模式
  title: "静水流深"
  description: "基于 Hugo 的高性能博客"
  keywords: [Blog, Hugo, PaperMod]
  author: Yuchen
  ShowToc: true
  TocOpen: true
  
  # 界面显示设置
  defaultTheme: auto # 跟随系统自动切换黑白模式
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  useHugoToc: true
  ShowLastMod: true

  # # 首页设置
  # homeInfoParams:
  #   Title: "欢迎光临 👋"
  #   Content: "欢迎来到我的博客。这里由 Hugo 驱动，部署于 Vercel。"
   


  profileMode:                # Profile 模式（我选的这个）
    enabled: true
    title: "My Wilderness"    # 主标题
    subtitle: "记录、思考、探索"
    imageUrl: "https://xihuheyi007.github.io/picx-images-hosting/avatar.26llgi1q84.webp"  # 替换为你的实际图片URL
    imageWidth: 120
    imageHeight: 120

  # 社交链接 (不需要的删掉)
  socialIcons:
    - name: github
      url: "https://github.com/xihuheyi007"
    - name: email
      url: "mailto:007@020720.xyz"

# 菜单栏配置
menu:
  main:
    - identifier: categories
      name: 🧩分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 🔖标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: ⏱时间轴
      url: /archives/
      weight: 30

assets:
    favicon: "/static/favicon.ico" # 对应 static 文件夹里的图片
    favicon16x16: "/static/favicon.ico"
    favicon32x32: "/static/favicon.ico"

label:
    text: "My Blog" # 左上角网站标题
    icon: "/static/favicon.ico" # 左上角小图标
    iconHeight: 35